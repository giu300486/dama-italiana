# Dama Italiana — infrastruttura dev locale
#
# Avvio:   docker compose up -d
# Stop:    docker compose down       (volumi conservati)
# Reset:   docker compose down -v    (cancella anche i dati)
#
# Note:
# - MySQL è esposto sulla porta host 3307 (mappata su 3306 del container)
#   per non confliggere con un eventuale MySQL locale già in ascolto su 3306.
# - Le credenziali sono lette da .env (non committato). .env.example fornisce
#   i default da copiare in .env per il setup iniziale.

services:
  mysql:
    image: mysql:8.0
    container_name: dama-italiana-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-dama_italiana}
      MYSQL_USER: ${MYSQL_USER:-dama}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dama}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  adminer:
    image: adminer:4
    container_name: dama-italiana-adminer
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${ADMINER_HOST_PORT:-8081}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql

volumes:
  mysql_data:
    name: dama-italiana-mysql-data
