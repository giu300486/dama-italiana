rules.title=Italian Draughts Rules
rules.section.setup.title=Initial setup
rules.section.setup.body=The board is 8×8 and the game is played exclusively on the 32 dark squares.\n\nThe dark square sits in the bottom-left corner from the White player's perspective.\n\nEach player has 12 men, placed on the three rows on their side of the board.\n\nWhite moves first.
rules.section.movement.title=Movement
rules.section.movement.body=A man moves one diagonal square forward at a time and never backwards.\n\nA king moves one diagonal square in any of the four directions: the Italian king is not a "flying king" and does not slide along the whole diagonal.
rules.section.capture.title=Capture
rules.section.capture.body=A capture is performed by jumping over an adjacent diagonal opponent piece and landing on the next square, which must be empty.\n\nMen capture only forward. Kings capture in all four diagonals, one square at a time.\n\nCaptures are mandatory whenever they are available.\n\nDistinctive Italian Draughts rule: a man cannot capture a king.
rules.section.precedence.title=Precedence laws
rules.section.precedence.body=When several capture sequences are available the player must apply the following four laws, in order:\n\n1. Quantity law: pick the sequence that captures the highest number of pieces.\n\n2. Quality law: when several sequences are tied on count, pick the one capturing the most kings.\n\n3. King-precedence law: when count and quality are tied, if a capture is possible both with a king and with a man, the king must capture.\n\n4. First-king law: when everything else is tied, the king must capture the opponent king first within the sequence.
rules.section.promotion.title=Promotion
rules.section.promotion.body=A man ending its move on the opponent's last row is promoted to king.\n\nPromotion ends the turn: a man that reaches the last row during a capture sequence stops there and is crowned, but does not continue capturing as a king in the same turn.
rules.section.endgame.title=Endgame
rules.section.endgame.body=A player wins when the opponent has no pieces left or no legal moves. Stalemate (no legal moves while pieces remain) counts as a loss in Italian Draughts, not a draw.\n\nThe game is drawn by: threefold repetition of the same position with the same player to move; 40 consecutive moves without captures and without man advances; mutual agreement (online via the "Offer draw" button).
rules.section.notation.title=Notation
rules.section.notation.body=FID notation numbers the 32 dark squares from 1 to 32.\n\nA simple move is written "FROM-TO" (e.g. 12-16).\n\nA capture is written "FROMxTO" (e.g. 12x19). Multi-captures chain every landing square (e.g. 12x19x26).

rules.diagram.setup.initial=Starting position: 12 white men and 12 black men on the first three rows.
rules.diagram.movement.man=A man may advance diagonally to one of the empty dark squares ahead.
rules.diagram.capture.simple=Simple capture: the white man jumps the adjacent black man and lands on the next square.
rules.diagram.capture.man_vs_king=A man cannot capture a king: the king is "untouchable" by a man.
rules.diagram.promotion.before=The white man is one step away from the last row: the next move will promote it.
rules.diagram.promotion.after=After promotion the man becomes a king, marked by the golden ring. The turn ends even if the promotion happened during a capture.

