rules.title=Regole della Dama Italiana
rules.section.setup.title=Setup iniziale
rules.section.setup.body=La damiera è 8×8 e si gioca esclusivamente sulle 32 case scure.\n\nLa casa scura si trova nell'angolo in basso a sinistra rispetto al giocatore Bianco.\n\nOgni giocatore dispone di 12 pedine, posizionate sulle prime tre file dal proprio lato.\n\nIl Bianco muove per primo.
rules.section.movement.title=Movimento
rules.section.movement.body=La pedina muove di una sola casa diagonalmente in avanti, mai indietro.\n\nLa dama muove di una sola casa diagonalmente in qualunque delle quattro direzioni: la dama italiana non è "volante" e non scorre lungo l'intera diagonale.
rules.section.capture.title=Cattura
rules.section.capture.body=Una cattura avviene saltando un pezzo avversario adiacente in diagonale e atterrando sulla casa immediatamente successiva, che deve essere vuota.\n\nLa pedina cattura solo in avanti. La dama cattura in tutte e quattro le diagonali, ma una sola casa per volta.\n\nLa cattura è obbligatoria quando possibile.\n\nRegola distintiva della Dama Italiana: la pedina non può catturare la dama.
rules.section.precedence.title=Leggi di precedenza
rules.section.precedence.body=Quando più sequenze di cattura sono disponibili, il giocatore deve applicare in ordine queste quattro leggi:\n\n1. Legge della quantità: scegliere la sequenza che cattura il maggior numero di pezzi.\n\n2. Legge della qualità: a parità di numero, scegliere quella che cattura più dame.\n\n3. Legge della precedenza della dama: a parità di numero e qualità, se si può catturare con dama o con pedina, catturare con la dama.\n\n4. Legge della prima dama: a parità di tutto, la dama deve catturare per prima la dama avversaria nella sequenza.
rules.section.promotion.title=Promozione
rules.section.promotion.body=Una pedina che termina la mossa sull'ultima riga avversaria viene promossa a dama.\n\nLa promozione termina il turno: una pedina che raggiunge l'ultima riga durante una sequenza di catture si ferma e viene promossa, ma non continua a catturare come dama nello stesso turno.
rules.section.endgame.title=Fine partita
rules.section.endgame.body=Si vince quando l'avversario non ha più pezzi oppure non ha mosse legali. Lo stallo (assenza di mosse con pezzi ancora in gioco) è considerato sconfitta nella Dama Italiana, non patta.\n\nLa partita è patta per: triplice ripetizione della stessa posizione con lo stesso giocatore al tratto; 40 mosse consecutive senza catture e senza spostamenti di pedina; accordo tra i giocatori (online tramite il pulsante "Offri patta").
rules.section.notation.title=Notazione
rules.section.notation.body=La notazione FID numera le 32 case scure da 1 a 32.\n\nUna mossa semplice si scrive "FROM-TO" (esempio: 12-16).\n\nUna cattura si scrive "FROMxTO" (esempio: 12x19). Una cattura multipla concatena tutte le case successive (esempio: 12x19x26).

rules.diagram.setup.initial=Posizione iniziale: 12 pedine bianche e 12 nere sulle prime tre file.
rules.diagram.movement.man=Una pedina può avanzare di una casa in diagonale verso una delle case scure libere.
rules.diagram.capture.simple=Cattura semplice: la pedina bianca salta la pedina nera adiacente e atterra sulla casa successiva.
rules.diagram.capture.man_vs_king=Una pedina non può catturare una dama: la dama è "intoccabile" da una pedina.
rules.diagram.promotion.before=La pedina bianca a un passo dall'ultima riga: la prossima mossa la promuoverà.
rules.diagram.promotion.after=Dopo la promozione la pedina diventa dama, segnata dall'anello dorato. Il turno termina anche se la promozione è avvenuta durante una cattura.

