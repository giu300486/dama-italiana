# Dama Italiana — server centrale
# Profilo default: ambiente di sviluppo locale. La configurazione di produzione
# arriva via env var (12-factor) e profilo dedicato (Fase 5+).

spring:
  application:
    name: dama-italiana-server
  datasource:
    # Default punta al MySQL locale dell'utente (porta standard 3306).
    # Override via env var DB_URL/DB_USERNAME/DB_PASSWORD per altri ambienti.
    # Il database `dama_italiana` deve esistere; lo schema è gestito da Flyway.
    url: ${DB_URL:jdbc:mysql://localhost:3306/dama_italiana}
    username: ${DB_USERNAME:dama}
    # Nessun default: se manca DB_PASSWORD Spring fallisce con messaggio chiaro
    # ("Could not resolve placeholder 'DB_PASSWORD'") invece di tentare la
    # connessione con password vuota (errore meno diagnostico).
    password: ${DB_PASSWORD}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui

logging:
  level:
    root: INFO
    com.damaitaliana: DEBUG
